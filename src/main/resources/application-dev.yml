spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/finkin
    username: ${DB_USER:finkin}
    password: ${DB_PASS:finkin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      # Hibernate 7: 'validate' em dev para garantir paridade com as migrations do Flyway
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.finkin: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO

# KYC mock: aprovação automática em dev
finkin:
  kyc:
    auto-approve: true
