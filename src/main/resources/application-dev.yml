spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/finkin
    username: ${DB_USER:finkin}
    password: ${DB_PASS:finkin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      # Spring Boot 4 / Hibernate 7: Flyway owns schema management; 'none' avoids
      # the ordering issue where Hibernate validates before Flyway migrates.
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.finkin: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO

# KYC mock: aprovação automática em dev
finkin:
  kyc:
    auto-approve: true
