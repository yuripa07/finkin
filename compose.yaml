services:
  postgres:
    image: postgres:17-alpine
    container_name: finkin-postgres
    environment:
      POSTGRES_DB: finkin
      POSTGRES_USER: finkin
      POSTGRES_PASSWORD: finkin
    ports:
      - "5432:5432"
    volumes:
      - finkin-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finkin -d finkin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finkin-redis
    ports:
      - "6379:6379"
    volumes:
      - finkin-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: finkin-pgadmin
    profiles: [tools]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@finkin.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  finkin-pgdata:
  finkin-redisdata:
